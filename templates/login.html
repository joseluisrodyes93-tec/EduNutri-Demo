<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNutri Gestión - Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="main-container">
        <header class="login-header">
            <h1>EduNutri Gestión</h1>
            <p>Tu comunidad escolar saludable</p>
        </header>

        <main class="login-card">
            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="correo">Correo o Cédula</label>
                    <input type="text" id="correo" name="correo" 
                           placeholder="Ej: usuario@gmail.com o 0912345678" 
                           required autocomplete="username" 
                           autocapitalize="none">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" 
                           placeholder="Introduce tu clave" 
                           required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
                
                <div class="form-footer">
                    <a href="/recuperar" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </main>

        <footer class="login-footer">
            <p>¿No tienes cuenta? <a href="/registro"><strong>Regístrate aquí</strong></a></p>
        </footer>
    </div>
</body>
</html>
